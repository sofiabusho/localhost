// Integration-test config. Ports chosen to avoid clashing with a local demo server.
// Run from repo root via: bash tests/integration.sh

site {
    bind 127.0.0.1:18080;
    bind 127.0.0.1:18081;
    name localhost;
    max_body 4k;
    errpage 400 www/errors/400.html;
    errpage 403 www/errors/403.html;
    errpage 404 www/errors/404.html;
    errpage 405 www/errors/405.html;
    errpage 413 www/errors/413.html;
    errpage 500 www/errors/500.html;

    path / {
        methods GET POST DELETE HEAD;
        root www;
        index index.html;
        autoindex on;
        upload tests/tmp/uploads;
    }

    path /old {
        methods GET;
        redirect 301 /;
    }

    path /cgi-bin {
        methods GET POST;
        root www/cgi;
        cgi .py /usr/bin/python3;
        cgi .sh /bin/bash;
    }
}

site {
    bind 127.0.0.1:18080;
    name alt.local;
    max_body 4k;
    path / {
        methods GET;
        root www;
        index index.html;
        autoindex off;
    }
}

site {
    bind 127.0.0.1:18082;
    name listing.local;
    max_body 4k;
    path / {
        methods GET;
        root www;
        autoindex on;
    }
}
