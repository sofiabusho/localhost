// Sample configuration for local development.
// Syntax is site/path oriented (not NGINX copy); see README.

site {
    bind 127.0.0.1:8080;
    bind 127.0.0.1:8081;
    name localhost;
    max_body 1M;
    errpage 400 www/errors/400.html;
    errpage 403 www/errors/403.html;
    errpage 404 www/errors/404.html;
    errpage 405 www/errors/405.html;
    errpage 413 www/errors/413.html;
    errpage 500 www/errors/500.html;

    path / {
        methods GET POST DELETE;
        root www;
        index index.html;
        autoindex on;
        upload www/uploads;
    }

    path /old {
        methods GET;
        redirect 301 /;
    }

    path /cgi-bin {
        methods GET POST;
        root www/cgi;
        cgi .py /usr/bin/python3;
        cgi .sh /bin/bash;
    }
}

// Name-based vhost sharing 127.0.0.1:8080 with the site above.
site {
    bind 127.0.0.1:8080;
    name alt.local;
    max_body 512k;
    path / {
        methods GET;
        root www;
        index index.html;
        autoindex off;
    }
}

site {
    bind 127.0.0.1:9090;
    name solo.local;
    max_body 512k;
    path / {
        methods GET;
        root www;
        index index.html;
        autoindex off;
    }
}
